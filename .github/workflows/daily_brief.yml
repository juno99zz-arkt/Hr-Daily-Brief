name: HR Daily Brief

on:
  schedule:
    - cron: '0 22 * * 0-4'   # 매일 07:00 KST (월~금) = UTC 전날 22:00
  workflow_dispatch:
    inputs:
      force:
        description: '공휴일에도 강제 실행'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # gh-pages push에 필요

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout gh-pages into public/
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: public

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:   ${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_ACTIONS:    "true"
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE="--force"
          fi
          python generate_brief.py --session morning $FORCE

      - name: Deploy to GitHub Pages
        run: |
          cd public
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add index.html
          if git diff --cached --quiet; then
            echo "변경 없음, 배포 생략."
            exit 0
          fi

          git commit -m "브리핑 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M') KST"
          git push origin gh-pages
          echo "배포 완료 → https://juno99zz-arkt.github.io/Hr-Daily-Brief/"
